name: Python CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  integrations:
    name: integrations (lint, type-check, test)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: integrations
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -e ".[dev]"
      - run: ruff check .
      - run: black --check .
      - run: mypy src
      - run: pytest

  sdk:
    name: sdk/python (lint, type-check, test)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: sdk/python
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -e ".[dev]"
      - run: ruff check .
      - run: black --check .
      - run: mypy src
      - run: pytest
