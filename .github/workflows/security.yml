name: Security

on:
  push:
    branches: [main]
  pull_request:
  schedule:
    # Weekly, so newly-disclosed advisories against pinned deps surface even
    # with no code changes.
    - cron: "0 6 * * 1"

jobs:
  cargo-audit:
    # One job per lockfile — the standalone crates (services, clients, exploits,
    # conformance, benchmarks) each carry their own Cargo.lock outside the core
    # workspace, so `core` alone left axum/tokio/reqwest/sd-jwt/criterion deps
    # unaudited. audit-check runs `cargo audit` in `working-directory` (it does
    # NOT accept manifest-path), so we point it at each lockfile's directory.
    name: cargo audit (${{ matrix.dir }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        dir:
          - core
          - services/witness
          - services/revocation-log
          - clients/revocation-http
          - exploits
          - conformance
          - benchmarks
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: rustsec/audit-check@v2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          working-directory: ${{ matrix.dir }}

  pip-audit:
    name: pip-audit (${{ matrix.package }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        package: [integrations, sdk/python]
    defaults:
      run:
        working-directory: ${{ matrix.package }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install .
      - run: pip install pip-audit
      - run: pip-audit
