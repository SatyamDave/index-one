name: Security

on:
  push:
    branches: [main]
  pull_request:
  schedule:
    # Weekly, so newly-disclosed advisories against pinned deps surface even
    # with no code changes.
    - cron: "0 6 * * 1"

jobs:
  cargo-audit:
    name: cargo audit (core)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: rustsec/audit-check@v2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          # The Rust workspace lives under core/. audit-check runs `cargo audit`
          # in working-directory (it does NOT accept manifest-path), so point it
          # at core/ where Cargo.toml + the committed Cargo.lock are.
          working-directory: core

  pip-audit:
    name: pip-audit (${{ matrix.package }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        package: [integrations, sdk/python]
    defaults:
      run:
        working-directory: ${{ matrix.package }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install .
      - run: pip install pip-audit
      - run: pip-audit
