name: Rust CI

on:
  push:
    branches: [main]
  pull_request:

env:
  CARGO_TERM_COLOR: always

jobs:
  fmt:
    name: cargo fmt --check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: cargo fmt --manifest-path core/Cargo.toml --all --check

  clippy:
    name: cargo clippy -D warnings
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: "core -> target"
      - run: cargo clippy --manifest-path core/Cargo.toml --workspace --all-targets -- -D warnings

  test:
    name: cargo test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: "core -> target"
      - run: cargo test --manifest-path core/Cargo.toml --workspace

  build:
    name: cargo build --release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: "core -> target"
      - run: cargo build --manifest-path core/Cargo.toml --workspace --release

  standalone-crates:
    # The crates that live outside the /core workspace (services, clients, the
    # exploit/conformance/benchmark crates) each have their own Cargo.toml and
    # were previously unbuilt by CI — so they could silently rot as core evolved.
    # This builds, lints, and tests each on every PR.
    name: standalone (${{ matrix.crate }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        crate:
          - services/witness
          - services/revocation-log
          - clients/revocation-http
          - exploits
          - conformance
          - benchmarks
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: "${{ matrix.crate }} -> target"
      - run: cargo fmt --manifest-path ${{ matrix.crate }}/Cargo.toml --all --check
      - run: cargo clippy --manifest-path ${{ matrix.crate }}/Cargo.toml --all-targets -- -D warnings
      - run: cargo test --manifest-path ${{ matrix.crate }}/Cargo.toml

  fuzz-build:
    # Build the cargo-fuzz targets so they can't rot as the core evolves. The
    # deep fuzzing campaign runs on demand / on a schedule, not on every PR.
    name: fuzz targets build (nightly)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@nightly
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: "fuzz -> target"
      - run: cargo install cargo-fuzz --locked
      - run: cargo +nightly fuzz build --fuzz-dir fuzz
